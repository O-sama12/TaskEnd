<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>
<body>

    <h1>Forgot Password?</h1>

    <p>
        Enter your email address and we'll send you a password reset link.
    </p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Send Reset Link
        </button>
    </form>

    <br>

    <a href="{% url 'login' %}">
        Login
    </a>

</body>
</html>
