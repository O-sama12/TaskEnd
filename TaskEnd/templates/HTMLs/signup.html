{%load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <title>Signup</title>
</head>
<body>
    <div class="container py-5">
        <form action="{% url 'signup' %}" method="post" class="mx-auto" style="max-width: 500px;">
            {% csrf_token %}
            <a href="{% provider_login_url 'google' %}" class="btn btn-outline-dark w-100 mb-4">
                Continue with Google
            </a>
            <h1 class="mb-2">Signup</h1>
            <p class="text-muted mb-4">Enter your details. Your information is safe with us.</p>

            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        
            <br>

            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        
            <br>

            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" minlength="8" required>

            <br>

            <p class="fw-semibold mb-2">Gender</p>

            <div class="form-check">
                <input class="form-check-input" type="radio" id="male" name="gender" value="male">
                <label for="male" class="form-check-label">Male</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" id="female" name="gender" value="female">
                <label for="female" class="form-check-label">Female</label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" id="prefer_not_to_say" name="gender" value="prefer_not_to_say">
                <label for="prefer_not_to_say" class="form-check-label">
                    Prefer not to say
                </label>
            </div>

            <br>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                <label for="terms" class="form-check-label">
                    I accept the Terms & Conditions and Privacy Policy
                </label>
            </div>

            <br>

            <button type="submit" class="btn btn-primary w-100">
                Sign Up
            </button>

        </form>

        <div class="login text-center mt-4">
            <p class="mb-0">
                Already a member?
                <a href="{% url 'login' %}">
                    Login
                </a>
            </p>
        </div>
    </div>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
